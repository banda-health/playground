services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '${VITE_PORT:-8080}:80'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_PORT=${API_PORT:-3001}
    depends_on:
      - api
    networks:
      - app-network

  api:
    build:
      context: ./api
    env_file:
      - .env
    environment:
      - PORT=${API_PORT:-3001}
      - NODE_ENV=production
      - DATABASE_URL=postgresql://playground:playground@postgres:5432/playground
    volumes:
      - mockups-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: playground
      POSTGRES_PASSWORD: playground
      POSTGRES_DB: playground
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U playground -d playground']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mockups-data:
  postgres-data:

networks:
  app-network:
    driver: bridge
