services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '${VITE_PORT:-8080}:80'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_PORT=${API_PORT:-3001}
    depends_on:
      - api
    networks:
      - app-network

  api:
    build:
      context: ./api
    env_file:
      - .env
    environment:
      - PORT=${API_PORT:-3001}
    volumes:
      - mockups-data:/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mockups-data:

networks:
  app-network:
    driver: bridge
